<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Crash – Cramble</title>
  <link rel="stylesheet" href="css/layout.css" />
  <link rel="stylesheet" href="css/crash.css" />
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
  <script src="firebase-config.js"></script>
</head>
<body>
  <div class="sidebar">
    <a href="home.html">Home</a>
    <a href="leaderboard.html">Leaderboard</a>
    <a href="blackjack.html">Blackjack</a>
    <a href="roulette.html">Roulette</a>
    <a href="slots.html">Slots</a>
    <a href="dice.html">Dice</a>
    <a href="crash.html" class="active">Crash</a>
    <a href="tower.html">Tower</a>
    <a href="mines.html">Mines</a>
    <a href="cases.html">Cases</a>
    <a href="plinko.html">Plinko</a>
  </div>

  <div class="content">
    <div id="profile-wrapper">
      <div id="profile-icon">👤</div>
      <div id="dropdown" class="hidden">
        <div onclick="viewProfile()">View Profile</div>
        <div onclick="logout()">Logout</div>
      </div>
    </div>

    <div class="crash-layout">

      <!-- ── Left panel ── -->
      <div class="crash-panel">

        <div class="panel-balance">
          Balance: $<span id="balance">0.00</span>
        </div>

        <div class="ctrl-group">
          <label class="ctrl-label">Bet Amount</label>
          <div class="bet-row">
            <button class="bet-adj" onclick="halveBet()">½</button>
            <input type="number" id="bet-input" value="10.00" min="0.01" step="0.01" />
            <button class="bet-adj" onclick="doubleBet()">2×</button>
          </div>
        </div>

        <div class="ctrl-group">
          <label class="ctrl-label">Auto Cash Out</label>
          <div class="auto-row">
            <label class="toggle-wrap">
              <input type="checkbox" id="auto-toggle" />
              <span class="toggle-slider"></span>
            </label>
            <input type="number" id="auto-target" value="2.00" min="1.01" step="0.01"
                   placeholder="Target ×" />
          </div>
        </div>

        <button class="btn-bet" id="bet-btn" onclick="placeBet()">Place Bet</button>
        <button class="btn-cashout" id="cashout-btn" disabled onclick="cashOut()">
          Cash Out — $0.00
        </button>

        <div class="panel-status" id="panel-status"></div>

        <!-- Bet history -->
        <div class="bet-history-label">Recent rounds</div>
        <div class="bet-history" id="bet-history"></div>

      </div>

      <!-- ── Right: graph area ── -->
      <div class="crash-main">
        <div class="canvas-wrap">
          <canvas id="crashCanvas"></canvas>
          <div class="mult-overlay" id="mult-overlay">
            <div class="mult-value" id="mult-value">—</div>
            <div class="mult-sub" id="mult-sub">Place your bet to start</div>
          </div>
        </div>
      </div>

    </div>
  </div>

  <script src="js/crash.js"></script>
</body>
</html>
