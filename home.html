<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Cramble – Home</title>
  <link rel="stylesheet" href="css/layout.css" />
  <link rel="stylesheet" href="css/home.css" />
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
  <script src="firebase-config.js"></script>
</head>
<body>
  <div class="sidebar">
    <a href="home.html" class="active">Home</a>
    <a href="leaderboard.html">Leaderboard</a>
    <a href="blackjack.html">Blackjack</a>
    <a href="roulette.html">Roulette</a>
    <a href="slots.html">Slots</a>
    <a href="dice.html">Dice</a>
    <a href="crash.html">Crash</a>
    <a href="tower.html">Tower</a>
    <a href="mines.html">Mines</a>
    <a href="cases.html">Cases</a>
    <a href="plinko.html">Plinko</a>
  </div>

  <div class="content">
    <div id="profile-wrapper">
      <div id="profile-icon">👤</div>
      <div id="dropdown" class="hidden">
        <div onclick="viewProfile()">View Profile</div>
        <div onclick="logout()">Logout</div>
      </div>
    </div>

    <h1 class="page-title">Choose Your Game</h1>

    <div class="game-grid">
      <div class="game-box">
        <div class="game-title">Blackjack</div>
        <a href="blackjack.html"><img src="img/blackjack.png" alt="Blackjack" /></a>
      </div>
      <div class="game-box">
        <div class="game-title">Roulette</div>
        <a href="roulette.html"><img src="img/roulette.png" alt="Roulette" /></a>
      </div>
      <div class="game-box">
        <div class="game-title">Slots</div>
        <a href="slots.html"><img src="img/slots.png" alt="Slots" /></a>
      </div>
      <div class="game-box">
        <div class="game-title">Dice</div>
        <a href="dice.html"><img src="img/dice.png" alt="Dice" /></a>
      </div>
      <div class="game-box">
        <div class="game-title">Crash</div>
        <a href="crash.html"><img src="img/crash.png" alt="Crash" /></a>
      </div>
      <div class="game-box">
        <div class="game-title">Tower</div>
        <a href="tower.html"><img src="img/tower.png" alt="Tower" /></a>
      </div>
      <div class="game-box">
        <div class="game-title">Mines</div>
        <a href="mines.html"><img src="img/mines.png" alt="Mines" /></a>
      </div>
      <div class="game-box">
        <div class="game-title">Cases</div>
        <a href="cases.html"><img src="img/cases.avif" alt="Cases" /></a>
      </div>
      <div class="game-box">
        <div class="game-title">Plinko</div>
        <a href="plinko.html"><img src="img/plinko.avif" alt="Plinko" /></a>
      </div>
    </div>

    <button id="redeem-btn">Redeem</button>

    <div id="redeem-popup">
      <div class="popup-content">
        <h2>Redeem Code</h2>
        <input type="text" id="redeem-input" placeholder="Enter code..." />
        <button id="submit-redeem">Submit</button>
        <button id="close-redeem" class="close-btn">Close</button>
        <p id="redeem-message"></p>
      </div>
    </div>
  </div>

  <script>
  document.addEventListener("DOMContentLoaded", () => {
    const auth = firebase.auth();
    const db = firebase.database();

    const icon = document.getElementById("profile-icon");
    const dropdown = document.getElementById("dropdown");
    const redeemBtn = document.getElementById("redeem-btn");
    const redeemPopup = document.getElementById("redeem-popup");
    const redeemInput = document.getElementById("redeem-input");
    const redeemMessage = document.getElementById("redeem-message");
    const submitBtn = document.getElementById("submit-redeem");
    const closeBtn = document.getElementById("close-redeem");

    auth.onAuthStateChanged(user => {
      if (!user) {
        window.location.href = "index.html";
      } else {
        db.ref("users/" + user.uid + "/profileImage").once("value").then(snapshot => {
          const image = snapshot.val();
          icon.innerHTML = "";
          if (image) {
            const img = document.createElement("img");
            img.src = image;
            icon.appendChild(img);
          } else {
            icon.textContent = user.email[0].toUpperCase();
          }
          icon.title = user.email;
        });

        icon.onclick = () => dropdown.classList.toggle("hidden");
      }
    });

    function logout() {
      auth.signOut().then(() => window.location.href = "index.html");
    }
    function viewProfile() {
      window.location.href = "profile.html";
    }
    window.logout = logout;
    window.viewProfile = viewProfile;

    document.addEventListener("click", e => {
      if (!document.getElementById("profile-wrapper").contains(e.target)) {
        dropdown.classList.add("hidden");
      }
    });

    redeemBtn.onclick = () => {
      redeemPopup.classList.add("active");
      redeemInput.value = "";
      redeemMessage.textContent = "";
      redeemInput.disabled = false;
      submitBtn.disabled = false;
    };

    closeBtn.onclick = () => redeemPopup.classList.remove("active");

    window.addEventListener("click", e => {
      if (e.target === redeemPopup) redeemPopup.classList.remove("active");
    });

    submitBtn.onclick = () => {
      const code = redeemInput.value.trim();
      if (!code) return;

      redeemInput.disabled = true;
      submitBtn.disabled = true;

      const user = auth.currentUser;
      if (!user) return;

      const codeRef = db.ref("codes/" + code);
      codeRef.once("value").then(snapshot => {
        const data = snapshot.val();
        if (data) {
          const redemptions = data.redemptions || {};
          if (redemptions[user.uid]) {
            redeemMessage.textContent = "You've already redeemed this code.";
            redeemMessage.style.color = "orange";
            redeemInput.disabled = false;
            submitBtn.disabled = false;
            return;
          }
          const points = data.points || 0;
          db.ref("users/" + user.uid + "/points").transaction(current => (current || 0) + points);
          codeRef.child("redemptions").child(user.uid).set(true);
          redeemMessage.textContent = `Success! +${points} points added.`;
          redeemMessage.style.color = "limegreen";
        } else {
          redeemMessage.textContent = "Invalid code. Try again in 3s.";
          redeemMessage.style.color = "red";
          setTimeout(() => {
            redeemInput.disabled = false;
            submitBtn.disabled = false;
          }, 3000);
        }
      });
    };
  });
  </script>
</body>
</html>
