<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tower – Cramble</title>
  <link rel="stylesheet" href="css/layout.css" />
  <link rel="stylesheet" href="css/tower.css" />
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
  <script src="firebase-config.js"></script>
</head>
<body>
  <div class="sidebar">
    <a href="home.html">Home</a>
    <a href="leaderboard.html">Leaderboard</a>
    <a href="blackjack.html">Blackjack</a>
    <a href="roulette.html">Roulette</a>
    <a href="slots.html">Slots</a>
    <a href="dice.html">Dice</a>
    <a href="crash.html">Crash</a>
    <a href="tower.html" class="active">Tower</a>
    <a href="mines.html">Mines</a>
    <a href="cases.html">Cases</a>
    <a href="plinko.html">Plinko</a>
  </div>

  <div class="content">
    <div id="profile-wrapper">
      <div id="profile-icon"></div>
      <div id="dropdown" class="hidden">
        <button onclick="viewProfile()">Profile</button>
        <button onclick="logout()">Logout</button>
      </div>
    </div>

    <div class="game-container">
      <h1>Dragon Tower</h1>

      <div id="balance-container">
        Balance: $<span id="balanceDisplay">0</span>
      </div>

      <div class="controls">
        <label>Bet: <input id="bet" type="number" value="10" min="1" /></label>
        <label>
          Difficulty:
          <select id="difficulty">
            <option value="easy">Easy</option>
            <option value="medium">Medium</option>
            <option value="hard">Hard</option>
            <option value="expert">Expert</option>
            <option value="master">Master</option>
          </select>
        </label>
        <button id="startBtn">Start Game</button>
        <button id="cashoutBtn" disabled>Cash Out</button>
        <div id="multiplierDisplay">Multiplier: 1.00×</div>
      </div>

      <div id="tower" class="tower"></div>
      <div id="result" class="result"></div>
    </div>
  </div>

  <script src="js/tower.js"></script>
</body>
</html>
